<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>phantoom.art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:            #000000;
      --surface:       rgba(255,255,255,0.02);
      --surface-hover: rgba(168,85,247,0.05);
      --border:        rgba(168,85,247,0.14);
      --border-hover:  rgba(168,85,247,0.50);
      --accent:        #a855f7;
      --glow:          rgba(168,85,247,0.20);
      --text:          #ffffff;
      --text-dim:      rgba(255,255,255,0.42);
      --text-ghost:    rgba(255,255,255,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }

    /* ── CURSOR ── */
    .c-dot {
      position: fixed; width: 5px; height: 5px;
      background: var(--accent); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(168,85,247,.5);
      transition: opacity .3s;
    }
    .c-ring {
      position: fixed; width: 28px; height: 28px;
      border: 1px solid rgba(168,85,247,.35); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .3s, height .3s, border-color .3s, opacity .3s;
    }
    .c-ring.on { width: 44px; height: 44px; border-color: rgba(168,85,247,.7); }
    @media (pointer: coarse) {
      .c-dot, .c-ring { display: none; }
      body { cursor: auto; }
      a { cursor: pointer; }
    }

    /* ── BACKGROUND ── */
    .bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-orb {
      position: absolute; border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(109,40,217,.10) 0%, transparent 68%);
      animation: breathe 11s ease-in-out infinite;
    }
    .bg-orb-t { width: 600px; height: 480px; top: -250px; left: 50%; transform: translateX(-50%); }
    .bg-orb-b {
      width: 340px; height: 340px; bottom: -150px; right: -130px;
      background: radial-gradient(ellipse at center, rgba(88,28,135,.07) 0%, transparent 68%);
      animation-duration: 15s; animation-direction: reverse;
    }
    @keyframes breathe { 0%,100% { opacity:.65; } 50% { opacity:1; } }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,.025) 1px, transparent 1px);
      background-size: 68px 68px;
    }
    .bg-scan {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0, transparent 3px,
        rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
      );
    }

    /* ── SHELL ── */
    .shell {
      position: relative; z-index: 1;
      max-width: 520px; margin: 0 auto;
      padding: 0 20px;
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 40px 0 24px;
      animation: rise .85s cubic-bezier(.16,1,.3,1) both;
    }

    .eyebrow {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 11px;
      letter-spacing: .22em;
      color: var(--accent);
      opacity: .55;
      margin-bottom: 12px;
    }

    .wordmark { position: relative; display: inline-block; }
    .wordmark-bloom {
      position: absolute; inset: -32px -44px;
      background: radial-gradient(ellipse at center, rgba(168,85,247,.12) 0%, transparent 65%);
      animation: bloom 5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes bloom {
      0%,100% { opacity:.5; transform:scale(1); }
      50%      { opacity:1; transform:scale(1.07); }
    }
    .wordmark h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(40px, 10.5vw, 62px);
      letter-spacing: .01em;
      line-height: 1;
      position: relative; z-index: 1;
    }
    .wordmark h1 em {
      font-style: normal;
      color: var(--accent);
      text-shadow: 0 0 22px rgba(168,85,247,.55), 0 0 44px rgba(168,85,247,.22);
    }

    .gem-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin: 14px auto 12px; width: 150px;
    }
    .gem-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(168,85,247,.4), transparent); }
    .gem-line-r { background: linear-gradient(to left, transparent, rgba(168,85,247,.4), transparent); }
    .gem-diamond {
      width: 4px; height: 4px; flex-shrink: 0;
      background: var(--accent); transform: rotate(45deg);
      box-shadow: 0 0 7px var(--accent), 0 0 14px rgba(168,85,247,.4);
      animation: gem-glow 3.2s ease-in-out infinite;
    }
    @keyframes gem-glow {
      0%,100% { box-shadow: 0 0 5px var(--accent), 0 0 10px rgba(168,85,247,.3); }
      50%      { box-shadow: 0 0 11px var(--accent), 0 0 24px rgba(168,85,247,.6); }
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(14px, 3.6vw, 17px);
      color: var(--text-dim);
      line-height: 1.4;
      letter-spacing: .02em;
    }

    /* ── LINKS ── */
    .links { flex: 1; padding-bottom: 10px; }

    .group { margin-bottom: 20px; animation: rise .8s cubic-bezier(.16,1,.3,1) both; }
    .group:nth-child(1) { animation-delay: .15s; }
    .group:nth-child(2) { animation-delay: .24s; }
    .group:nth-child(3) { animation-delay: .33s; }

    .group-head { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; }
    .group-name {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 11.5px;
      letter-spacing: .22em;
      color: var(--text-ghost);
      flex-shrink: 0;
    }
    .group-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(168,85,247,.13), transparent); }

    /* Card */
    .card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      text-decoration: none; color: inherit;
      margin-bottom: 7px;
      position: relative; overflow: hidden;
      transition:
        border-color .5s cubic-bezier(.25,.46,.45,.94),
        background   .5s cubic-bezier(.25,.46,.45,.94),
        transform    .5s cubic-bezier(.34,1.4,.64,1),
        box-shadow   .5s cubic-bezier(.25,.46,.45,.94);
      -webkit-tap-highlight-color: transparent;
    }
    .card::before {
      content: ''; position: absolute;
      left: 0; top: 12%; bottom: 12%; width: 2px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      border-radius: 0 2px 2px 0;
      opacity: 0; transition: opacity .5s ease;
    }
    .card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 100% at 8% 50%, rgba(168,85,247,.06) 0%, transparent 68%);
      opacity: 0; transition: opacity .5s ease;
    }
    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateX(5px);
      box-shadow: 0 0 24px var(--glow), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .card:hover::before, .card:hover::after { opacity: 1; }
    .card:active { transform: translateX(3px) scale(.985); transition-duration: .15s; }

    .icon {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 8px;
      background: rgba(168,85,247,.07);
      border: 1px solid rgba(168,85,247,.14);
      display: flex; align-items: center; justify-content: center;
      transition: background .5s, border-color .5s, box-shadow .5s;
    }
    .card:hover .icon {
      background: rgba(168,85,247,.15);
      border-color: rgba(168,85,247,.4);
      box-shadow: 0 0 13px rgba(168,85,247,.26);
    }
    .icon svg { width: 15px; height: 15px; }
    .i-fill { fill: var(--accent); }
    .i-stroke { fill: none; stroke: var(--accent); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

    .card-text { flex: 1; min-width: 0; }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13.5px, 3.4vw, 15.5px);
      font-weight: 600;
      letter-spacing: .04em;
      line-height: 1;
      margin-bottom: 3px;
    }
    .card-hint {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(11px, 2.5vw, 12.5px);
      color: var(--text-ghost);
      letter-spacing: .02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .arrow {
      flex-shrink: 0;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 19px;
      color: var(--accent);
      opacity: 0; transform: translateX(-8px);
      transition: opacity .45s ease, transform .5s cubic-bezier(.34,1.4,.64,1);
      line-height: 1;
    }
    .card:hover .arrow { opacity: 1; transform: translateX(0); }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 16px 0 28px;
      border-top: 1px solid rgba(168,85,247,.08);
      animation: rise .8s .5s cubic-bezier(.16,1,.3,1) both;
    }
    .footer p {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 11.5px;
      color: var(--text-ghost);
      letter-spacing: .16em;
      display: flex; align-items: center; justify-content: center;
      gap: 9px; flex-wrap: wrap;
    }
    .footer-gem {
      display: inline-block; width: 3px; height: 3px;
      background: var(--accent); transform: rotate(45deg);
      opacity: .4; flex-shrink: 0;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,85,247,.28); border-radius: 2px; }
    ::selection { background: rgba(168,85,247,.35); color: #fff; }
  </style>
</head>

  <script>
    const dot = document.getElementById('cDot');
    const ring = document.getElementById('cRing');
    let mx = -200, my = -200, rx = -200, ry = -200;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    });
    (function tick() {
      rx += (mx - rx) * 0.11; ry += (my - ry) * 0.11;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(tick);
    })();
    document.querySelectorAll('a').forEach(a => {
      a.addEventListener('mouseenter', () => ring.classList.add('on'));
      a.addEventListener('mouseleave', () => ring.classList.remove('on'));
    });
    document.addEventListener('mouseleave', () => { dot.style.opacity='0'; ring.style.opacity='0'; });
    document.addEventListener('mouseenter', () => { dot.style.opacity='1'; ring.style.opacity='1'; });
  </script>
